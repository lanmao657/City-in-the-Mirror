<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>镜中城 | City of Mirrors</title>
<style>
/* ══════════════════════════════════════════════════════════
   《镜中城》 网页交互版
   ══════════════════════════════════════════════════════════ */

* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
@keyframes fadeOut   { from { opacity: 1 } to { opacity: 0 } }
@keyframes slideUp   { from { opacity: 0; transform: translateY(30px) } to { opacity: 1; transform: translateY(0) } }
@keyframes slideDown { from { opacity: 1; transform: translateY(0) } to { opacity: 0; transform: translateY(30px) } }
@keyframes breathe   { 0%,100% { opacity: .15 } 50% { opacity: .35 } }
@keyframes float     { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-8px) } }
@keyframes glow      { 0%,100% { opacity: .2 } 50% { opacity: .5 } }
@keyframes typewriter{ from { width: 0 } to { width: 100% } }
@keyframes pulse     { 0%,100% { transform: scale(1) } 50% { transform: scale(1.05) } }
@keyframes shimmer   { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
@keyframes sparkle   { 0%,100% { opacity: 0; transform: scale(0) } 50% { opacity: 1; transform: scale(1) } }

:root {
  --left-primary:   #3A4A5C;  --left-accent: #4A90D9;  --left-light: #B8C4D0;
  --left-dark:      #1A1A2E;  --left-glow:   #4A6FA5;
  --right-primary:  #D4A574;  --right-accent:#E8B88C;  --right-light: #FFF8E7;
  --right-dark:     #3A2E20;  --right-glow:  #FFE4C0;
  --mirror:         #C0C0C0;  --mirror-light:#E8E8E8;
  --silent:         #9B9B9B;  --bg: #0A0A15;
  --dialogue-h: 240px;
}

body {
  background: #000; display: flex; align-items: center; justify-content: center;
  min-height: 100vh; font-family: "Noto Serif SC","Source Han Serif SC","Songti SC",Georgia,serif;
  overflow: hidden; color: #E8E8E8;
}

#game-container {
  position: relative; width: 1280px; height: 720px;
  background: var(--bg); overflow: hidden; border-radius: 4px;
  box-shadow: 0 0 80px rgba(0,0,0,.8);
}

/* ── Background Layer ── */
#bg-layer {
  position: absolute; inset: 0; transition: opacity 1s ease;
  display: flex; align-items: center; justify-content: center;
}
#bg-layer .bg-gradient {
  position: absolute; inset: 0; transition: background 1.2s ease;
  background-size: cover; background-position: center;
}
#bg-layer .bg-content {
  position: relative; z-index: 1; font-size: 14px; color: #606060;
  letter-spacing: .1em; opacity: .4;
}
#bg-layer .vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.6) 100%);
  z-index: 2;
}

/* ── Particle Layer ── */
#particles {
  position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%; pointer-events: none; opacity: 0;
}
.particle.frost { background: rgba(74,144,217,.4); }
.particle.petal { background: rgba(212,165,116,.4); }
.particle.mirror-p { background: rgba(192,192,192,.3); }

/* ── Center Line (mirror wall) ── */
.center-line {
  position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, transparent, rgba(192,192,192,.15), transparent);
  z-index: 4; pointer-events: none;
}

/* ── Chapter Title ── */
#chapter-title {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 50;
  background: rgba(0,0,0,.85); opacity: 0; pointer-events: none;
  transition: opacity .8s ease;
}
#chapter-title.show { opacity: 1; pointer-events: auto; }
#chapter-title .zh { font-size: 42px; color: var(--mirror-light); letter-spacing: .15em; margin-bottom: 8px; }
#chapter-title .en { font-size: 16px; color: #808080; font-style: italic; letter-spacing: .05em; }

/* ── Character Layer ── */
#character-layer {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: var(--dialogue-h);
}
.char-sprite {
  display: flex; flex-direction: column; align-items: center;
  margin: 0 30px; opacity: 0; transform: translateY(20px);
  transition: all .6s ease;
}
.char-sprite.visible { opacity: 1; transform: translateY(0); }
.char-body {
  width: 120px; height: 280px; border-radius: 4px 4px 0 0;
  position: relative; overflow: hidden;
}
.char-body::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(to top, rgba(0,0,0,.3), transparent);
}
.char-name-tag {
  margin-top: 8px; padding: 4px 16px; font-size: 13px;
  letter-spacing: .1em; border-radius: 2px;
}

/* ── Dialogue Box ── */
#dialogue-box {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: var(--dialogue-h); z-index: 20;
  display: flex; flex-direction: column;
  transition: all .5s ease;
}
#dialogue-box.city-left {
  background: linear-gradient(to right, rgba(26,26,46,.92), rgba(26,26,46,.88));
  border-top: 1px solid rgba(74,144,217,.3);
}
#dialogue-box.city-right {
  background: linear-gradient(to right, rgba(58,46,32,.9), rgba(58,46,32,.85));
  border-top: 1px solid rgba(212,165,116,.3);
}
#dialogue-box.city-mirror {
  background: linear-gradient(to right, rgba(20,20,35,.92), rgba(20,20,35,.88));
  border-top: 1px solid rgba(192,192,192,.2);
}
#dialogue-box.city-narrator {
  background: rgba(0,0,0,.6); border-top: none;
  align-items: center; justify-content: center;
}
#dialogue-box.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

#speaker-name {
  padding: 10px 24px 6px; font-size: 16px; font-weight: 600;
  letter-spacing: .08em; min-height: 30px;
}
#dialogue-text {
  flex: 1; padding: 8px 24px 16px; font-size: 18px; line-height: 1.7;
  letter-spacing: .02em; cursor: pointer; position: relative;
  overflow-y: auto;
}
#dialogue-text.narrator-text {
  text-align: center; font-style: italic; color: #B0B0B0;
  font-size: 17px; line-height: 1.8; padding: 20px 60px;
}
#skip-hint {
  position: absolute; bottom: 12px; right: 20px;
  font-size: 12px; color: rgba(255,255,255,.25);
  animation: breathe 3s ease-in-out infinite;
}

/* ── HUD ── */
#hud { position: absolute; inset: 0; z-index: 30; pointer-events: none; }
#hud-chapter {
  position: absolute; top: 16px; left: 20px;
  font-size: 14px; color: #909090; letter-spacing: .05em;
  opacity: 0; transition: opacity .5s;
}
#hud-chapter.show { opacity: 1; }
#hud-menu-btn {
  position: absolute; top: 14px; right: 18px;
  font-size: 22px; color: rgba(255,255,255,.4); cursor: pointer;
  pointer-events: auto; transition: color .3s; z-index: 35;
}
#hud-menu-btn:hover { color: #fff; }
#mirror-bar-container {
  position: absolute; bottom: 252px; right: 24px;
  width: 150px; height: 6px; background: rgba(0,0,0,.4);
  border-radius: 3px; overflow: hidden;
}
#mirror-bar-fill {
  height: 100%; border-radius: 3px; width: 50%;
  background: linear-gradient(to right, var(--left-accent), var(--right-primary));
  transition: width .6s ease;
}
#mirror-labels {
  position: absolute; bottom: 260px; right: 24px; width: 150px;
  display: flex; justify-content: space-between;
  font-size: 10px; opacity: .4;
}
#mirror-labels .lbl-truth { color: var(--left-accent); }
#mirror-labels .lbl-lie   { color: var(--right-primary); }
#hud-alignment {
  position: absolute; bottom: 268px; right: 24px; width: 150px;
  text-align: center; font-size: 11px; color: #707070;
  opacity: 0; transition: opacity .4s;
}
#hud-alignment.show { opacity: 1; }

/* ── Language Wheel ── */
#wheel-overlay {
  position: absolute; inset: 0; z-index: 40;
  background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .4s ease;
}
#wheel-overlay.show { opacity: 1; pointer-events: auto; }
#wheel-container {
  width: 780px; background: rgba(26,26,46,.95);
  border: 1px solid rgba(192,192,192,.15); border-radius: 8px;
  padding: 28px 32px; transform: scale(.9);
  transition: transform .4s ease; box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
#wheel-overlay.show #wheel-container { transform: scale(1); }
#wheel-context {
  text-align: center; font-size: 15px; color: #808080;
  font-style: italic; margin-bottom: 20px; letter-spacing: .03em;
}
#wheel-options { display: flex; gap: 20px; margin-bottom: 14px; }
.wheel-btn {
  flex: 1; padding: 22px 18px; border: none; border-radius: 4px;
  cursor: pointer; transition: all .3s; position: relative; overflow: hidden;
  min-height: 200px; display: flex; flex-direction: column;
}
.wheel-btn::before {
  content: ''; position: absolute; inset: 0; opacity: 0;
  transition: opacity .3s;
}
.wheel-btn:hover::before { opacity: 1; }
.wheel-btn.truth-btn {
  background: linear-gradient(135deg, #2A3A4C, #3A4A5C);
  border: 1px solid rgba(74,144,217,.3);
}
.wheel-btn.truth-btn::before { background: linear-gradient(135deg, #3A4A5C, #4A6FA5); }
.wheel-btn.truth-btn:hover { border-color: rgba(74,144,217,.6); box-shadow: 0 0 20px rgba(74,144,217,.2); }
.wheel-btn.lie-btn {
  background: linear-gradient(135deg, #3A2E20, #4A3A2C);
  border: 1px solid rgba(212,165,116,.3);
}
.wheel-btn.lie-btn::before { background: linear-gradient(135deg, #4A3A2C, #6A5A40); }
.wheel-btn.lie-btn:hover { border-color: rgba(212,165,116,.6); box-shadow: 0 0 20px rgba(212,165,116,.2); }
.wheel-btn .wb-icon { font-size: 20px; margin-bottom: 10px; position: relative; z-index: 1; }
.wheel-btn.truth-btn .wb-icon { color: var(--left-accent); }
.wheel-btn.lie-btn .wb-icon   { color: var(--right-primary); }
.wheel-btn .wb-text {
  font-size: 16px; line-height: 1.6; text-align: left; position: relative; z-index: 1;
}
.wheel-btn.truth-btn .wb-text { color: var(--left-light); }
.wheel-btn.lie-btn .wb-text   { color: var(--right-light); }
.wheel-btn .wb-key {
  position: absolute; bottom: 8px; right: 12px;
  font-size: 11px; color: rgba(255,255,255,.2); z-index: 1;
}
#wheel-silent-wrap { text-align: center; }
#wheel-silent-btn {
  padding: 10px 40px; background: rgba(155,155,155,.12);
  border: 1px dashed rgba(155,155,155,.25); border-radius: 4px;
  color: var(--silent); font-size: 15px; cursor: pointer;
  transition: all .3s; animation: breathe 4s ease-in-out infinite;
  font-family: inherit; letter-spacing: .05em;
}
#wheel-silent-btn:hover {
  background: rgba(155,155,155,.25); border-color: rgba(155,155,155,.4);
  animation: none; opacity: 1 !important;
}
#wheel-silent-hint {
  margin-top: 6px; font-size: 11px; color: #404040;
}

/* ── Main Menu ── */
#main-menu {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: url('images/mirror_crack.png') center/cover no-repeat;
}
#main-menu::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(10,10,21,.7);
}
#main-menu.hidden { display: none; }
.menu-crack {
  position: absolute; left: 50%; top: 0; bottom: 0; width: 3px;
  transform: translateX(-50%);
  background: linear-gradient(to bottom, transparent 10%, rgba(192,192,192,.12) 30%,
    rgba(192,192,192,.18) 50%, rgba(192,192,192,.12) 70%, transparent 90%);
}
.menu-glow-l {
  position: absolute; left: 20%; top: 50%; width: 300px; height: 300px;
  transform: translate(-50%,-50%); border-radius: 50%;
  background: radial-gradient(circle, rgba(74,144,217,.06), transparent 70%);
  animation: glow 6s ease-in-out infinite;
}
.menu-glow-r {
  position: absolute; right: 20%; top: 30%; width: 300px; height: 300px;
  transform: translate(50%,-50%); border-radius: 50%;
  background: radial-gradient(circle, rgba(212,165,116,.06), transparent 70%);
  animation: glow 6s ease-in-out infinite 3s;
}
.menu-title {
  position: relative; z-index: 2; text-align: center; margin-bottom: 50px;
}
.menu-title h1 {
  font-size: 52px; font-weight: 400; color: #E8E8E8; letter-spacing: .2em;
  margin-bottom: 8px; text-shadow: 0 0 30px rgba(192,192,192,.15);
}
.menu-title .subtitle {
  font-size: 16px; color: #606060; font-style: italic; letter-spacing: .08em;
}
.menu-buttons {
  position: relative; z-index: 2; display: flex; flex-direction: column; gap: 6px;
}
.menu-btn {
  background: none; border: none; color: #707070; font-size: 20px;
  padding: 14px 50px; cursor: pointer; transition: all .3s;
  font-family: inherit; letter-spacing: .12em; position: relative;
  text-align: center; min-width: 240px;
}
.menu-btn::before {
  content: ''; position: absolute; left: 0; top: 50%; width: 3px; height: 0;
  background: var(--mirror); transform: translateY(-50%);
  transition: height .3s;
}
.menu-btn:hover { color: #FFFFFF; }
.menu-btn:hover::before { height: 20px; }
.menu-version {
  position: absolute; bottom: 16px; left: 20px;
  font-size: 12px; color: #303030; z-index: 2;
}

/* ── Pause Menu ── */
#pause-overlay {
  position: absolute; inset: 0; z-index: 90;
  background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
#pause-overlay.show { opacity: 1; pointer-events: auto; }
#pause-box {
  background: rgba(26,26,46,.95); border: 1px solid rgba(192,192,192,.1);
  border-radius: 6px; padding: 30px 40px; min-width: 280px;
}
.pause-item {
  display: block; width: 100%; background: none; border: none;
  color: #B0B0B0; font-size: 20px; padding: 14px 20px;
  cursor: pointer; transition: all .2s; text-align: center;
  font-family: inherit; letter-spacing: .08em;
}
.pause-item:hover { color: #fff; background: rgba(255,255,255,.06); }

/* ── Achievement Toast ── */
#achievement-toast {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  z-index: 80; background: rgba(26,26,46,.95);
  border: 1px solid rgba(192,192,192,.15); border-radius: 6px;
  padding: 14px 28px; display: flex; align-items: center; gap: 12px;
  transition: top .5s ease; white-space: nowrap;
}
#achievement-toast.show { top: 20px; }
#achievement-toast .ach-icon { font-size: 22px; color: var(--mirror); }
#achievement-toast .ach-text { font-size: 16px; color: #E8E8E8; }
#achievement-toast .ach-desc { font-size: 13px; color: #808080; margin-top: 2px; }

/* ── Responsive ── */
@media (max-width: 1300px) {
  #game-container { width: 100vw; height: 56.25vw; max-height: 100vh; border-radius: 0; }
}
@media (max-width: 800px) {
  #wheel-options { flex-direction: column; }
  .wheel-btn { min-height: 120px; }
  #wheel-container { width: 92%; padding: 18px; }
  .menu-title h1 { font-size: 36px; }
  .menu-btn { font-size: 17px; padding: 12px 30px; }
  #dialogue-text { font-size: 16px; }
  .char-body { width: 80px; height: 180px; }
}
</style>
</head>
<body>
<div id="game-container">
  <!-- Background -->
  <div id="bg-layer">
    <div class="bg-gradient"></div>
    <div class="bg-content"></div>
    <div class="vignette"></div>
  </div>
  <div class="center-line"></div>
  <div id="particles"></div>

  <!-- Characters -->
  <div id="character-layer"></div>

  <!-- Dialogue -->
  <div id="dialogue-box" class="city-mirror hidden">
    <div id="speaker-name"></div>
    <div id="dialogue-text"><span id="skip-hint">点击继续 ▷</span></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-chapter"></div>
    <div id="hud-menu-btn" onclick="togglePause()">≡</div>
    <div id="hud-alignment">行者</div>
    <div id="mirror-labels"><span class="lbl-truth">❄</span><span class="lbl-lie">✿</span></div>
    <div id="mirror-bar-container"><div id="mirror-bar-fill"></div></div>
  </div>

  <!-- Chapter Title -->
  <div id="chapter-title"><div class="zh"></div><div class="en"></div></div>

  <!-- Language Wheel -->
  <div id="wheel-overlay">
    <div id="wheel-container">
      <div id="wheel-context"></div>
      <div id="wheel-options">
        <button class="wheel-btn truth-btn" onclick="choose('truth')">
          <div class="wb-icon">❄ 真话</div>
          <div class="wb-text" id="wb-truth-text"></div>
          <div class="wb-key">按 1</div>
        </button>
        <button class="wheel-btn lie-btn" onclick="choose('lie')">
          <div class="wb-icon">假话 ✿</div>
          <div class="wb-text" id="wb-lie-text"></div>
          <div class="wb-key">按 2</div>
        </button>
      </div>
      <div id="wheel-silent-wrap">
        <button id="wheel-silent-btn" onclick="choose('silent')">沉默</button>
        <div id="wheel-silent-hint">按 S 键</div>
      </div>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="main-menu">
    <div class="menu-crack"></div>
    <div class="menu-glow-l"></div>
    <div class="menu-glow-r"></div>
    <div class="menu-title">
      <h1>镜 中 城</h1>
      <div class="subtitle">City of Mirrors</div>
    </div>
    <div class="menu-buttons">
      <button class="menu-btn" onclick="startGame()">开 始 游 戏</button>
      <button class="menu-btn" onclick="showAbout()">关      于</button>
    </div>
    <div class="menu-version">v0.1.0 Web</div>
  </div>

  <!-- Pause Menu -->
  <div id="pause-overlay">
    <div id="pause-box">
      <button class="pause-item" onclick="togglePause()">返回游戏</button>
      <button class="pause-item" onclick="returnToMenu()">返回主菜单</button>
    </div>
  </div>

  <!-- Achievement Toast -->
  <div id="achievement-toast">
    <div class="ach-icon">✦</div>
    <div><div class="ach-text" id="ach-name"></div><div class="ach-desc" id="ach-desc"></div></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   《镜中城》 Game Engine
   ══════════════════════════════════════════════════════════════ */

/* ── State ────────────────────────────────────────────────── */
const S = {
  truthScore: 0, lieScore: 0, silentCount: 0,
  relationships: { baisui:30, xiaoxue:30, shiyan:20, yan:30, li:30,
                   yunshang:30, miyu:30, huayan:20, ming:30, yao:30, ying:50 },
  flags: {}, memories: new Set(), achievements: new Set(),
  leftHealth: 100, rightHealth: 100,
  sceneQueue: [], sceneIndex: 0, choiceCallback: null,
  typing: false, typeTimer: null, paused: false,
  currentBg: '', currentCity: 'mirror',
};

/* ── Scenes Database ──────────────────────────────────────── */
const SCENES = {

/* ─────── Prologue ─────── */
prologue: {
  bg: "url('images/mirror_crack.png') center/cover",
  bgLabel: '镜墙裂缝',
  city: 'narrator',
  chapter: { zh: '', en: '' },
  dialogue: [
    { text: '你醒来时，面前是一面镜子。' },
    { text: '镜子里的人，是你。但你不知道那是谁。' },
    { speaker: '?', text: '你的手里有一张纸条，上面写着一个字——' },
    { speaker: '?', text: '「勿言」' },
    { text: '你不记得这是你的名字，还是一个命令。' },
    { text: '裂缝的两边，各有微弱的光。一边是冷蓝色，一边是暖金色。' },
    {
      choice: {
        context: '向哪边走？',
        truth: { label: '向左走', text: '冷蓝色的光', next: 'ch1_left_arrive' },
        lie:   { label: '向右走', text: '暖金色的光', next: 'ch1_right_arrive' },
      }
    }
  ]
},

/* ─────── Chapter 1 — Left City ─────── */
ch1_left_arrive: {
  bg: "url('images/left_city_entrance.png') center/cover",
  bgLabel: '左城入口',
  city: 'left',
  chapter: { zh: '第一章：醒', en: 'Chapter 1: Awake' },
  dialogue: [
    { text: '空气里有一种奇怪的安静。' },
    { text: '不是寂静——而是所有的声音都被削去了圆润的部分，只剩下棱角。' },
    { speaker: '?', text: '你不是这里的人。' },
    { charShow: 'baisui', charColor: '#3A4A5C', charNameColor: '#4A90D9' },
    { speaker: '白岁', text: '你不是这里的人。' },
    {
      choice: {
        context: '石匠停下手里的刻刀，看着你。',
        truth:  { text: '我不知道自己是哪里的人。', next: 'ch1_baisui_truth' },
        lie:    { text: '我是从很远的地方来的。',   next: 'ch1_baisui_lie' },
        silent: { next: 'ch1_baisui_silent' },
      }
    }
  ]
},
ch1_baisui_truth: {
  bg: 'linear-gradient(135deg, #1A2A3E 0%, #222838 50%, #1A1A2E 100%)',

/* ── Helpers ──────────────────────────────────────────────── */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

/* ── Display ─────────────────────────────────────────────── */
function setBg(grad, label) {
  const bg = $('.bg-gradient');
  bg.style.background = grad;
  $('.bg-content').textContent = label || '';
  S.currentBg = grad;
}

function setCity(city) {
  S.currentCity = city;
  const db = $('#dialogue-box');
  db.className = 'city-' + city;
}

function showChapterTitle(zh, en) {
  const ct = $('#chapter-title');
  if (!zh) { ct.classList.remove('show'); return; }
  ct.querySelector('.zh').textContent = zh;
  ct.querySelector('.en').textContent = en || '';
  ct.classList.add('show');
  return new Promise(r => setTimeout(() => { ct.classList.remove('show'); setTimeout(r,400); }, 2500));
}

function showCharacter(id, color, nameColor) {
  let el = document.getElementById('char-'+id);
  if(!el) {
    el = document.createElement('div');
    el.id = 'char-'+id;
    el.className = 'char-sprite';
    const names = {baisui:'白岁',yunshang:'云裳',ying:'影',xiaoxue:'小雪',
      shiyan:'石言',yan:'岩',li:'砾',yao:'瑶',miyu:'蜜语',huayan:'花言',ming:'明',hua_child:'画'};
    const nc = nameColor || '#B0B0B0';
    el.innerHTML = `<div class="char-body" style="background:${color||'#3A4A5C'}"></div>
      <div class="char-name-tag" style="color:${nc};background:${color||'#3A4A5C'}40">${names[id]||id}</div>`;
    $('#character-layer').appendChild(el);
  }
  requestAnimationFrame(()=> el.classList.add('visible'));
}
function hideCharacter(id) {
  const el = document.getElementById('char-'+id);
  if(el) el.classList.remove('visible');
}

function showDialogue(speaker, text) {
  const db = $('#dialogue-box');
  db.classList.remove('hidden');
  const sn = $('#speaker-name');
  sn.textContent = speaker || '';
  if(!speaker) sn.style.display='none'; else sn.style.display='block';
  const dt = $('#dialogue-text');
  if(!speaker && S.currentCity==='narrator') dt.classList.add('narrator-text');
  else dt.classList.remove('narrator-text');
  typeText(dt, text);
}
function hideDialogue() { $('#dialogue-box').classList.add('hidden'); }

function typeText(el, text) {
  if(S.typeTimer) clearInterval(S.typeTimer);
  S.typing = true;
  el.innerHTML = '<span id="skip-hint">点击继续 ▷</span>';
  const span = document.createElement('span');
  span.id = 'typed-text';
  el.insertBefore(span, el.firstChild);
  let i = 0;
  S.typeTimer = setInterval(() => {
    if(i < text.length) { span.textContent += text[i]; i++; }
    else { clearInterval(S.typeTimer); S.typeTimer=null; S.typing=false; }
  }, 35);
}

function updateHUD() {
  const t=S.truthScore, l=S.lieScore, s=S.silentCount, total=t+l;
  const ratio = total? l/total : .5;
  $('#mirror-bar-fill').style.width = (ratio*100)+'%';
  let al='行者';
  const ta=t+l+s||1;
  if(s/ta>.4) al='沉默者'; else if(t/(total||1)>.7) al='言真者';
  else if(l/(total||1)>.7) al='织谎者'; else if(t/(total||1)>=.3) al='渡者';
  $('#hud-alignment').textContent = al;
  if(total>0) $('#hud-alignment').classList.add('show');
}

function updateParticles(city) {
  const pc = $('#particles');
  pc.innerHTML = '';
  const cls = city==='left'?'frost': city==='right'?'petal':'mirror-p';
  for(let i=0; i<15; i++) {
    const p = document.createElement('div');
    p.className = 'particle '+cls;
    const sz = 2+Math.random()*4;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;
      opacity:0;animation:float ${4+Math.random()*6}s ease-in-out infinite ${Math.random()*5}s,
      fadeIn 2s ease ${Math.random()*3}s forwards;`;
    pc.appendChild(p);
  }
}

/* ── Wheel ────────────────────────────────────────────────── */
function showWheel(context, truthText, lieText, hasSilent) {
  $('#wheel-context').textContent = context || '';
  $('#wb-truth-text').textContent = truthText || '';
  $('#wb-lie-text').textContent = lieText || '';
  $('#wheel-silent-wrap').style.display = hasSilent!==false ? 'block' : 'none';
  $('#wheel-overlay').classList.add('show');
}
function hideWheel() { $('#wheel-overlay').classList.remove('show'); }

function choose(type) {
  hideWheel();
  if(type==='truth') S.truthScore++;
  else if(type==='lie') S.lieScore++;
  else S.silentCount++;
  updateHUD();
  if(S.choiceCallback) { const cb=S.choiceCallback; S.choiceCallback=null; cb(type); }
}

/* ── Achievement ──────────────────────────────────────────── */
function showAchievement(id, name, desc) {
  if(S.achievements.has(id)) return;
  S.achievements.add(id);
  $('#ach-name').textContent = name;
  $('#ach-desc').textContent = desc;
  const t = $('#achievement-toast');
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 3500);
}

/* ── Apply Effects ────────────────────────────────────────── */
function applyEffects(eff) {
  if(!eff) return;
  if(eff.rel) { S.relationships[eff.rel[0]] = clamp((S.relationships[eff.rel[0]]||0)+eff.rel[1],0,100); }
  if(eff.rel2) { S.relationships[eff.rel2[0]] = clamp((S.relationships[eff.rel2[0]]||0)+eff.rel2[1],0,100); }
  if(eff.city) { if(eff.city[0]==='left') S.leftHealth=clamp(S.leftHealth+eff.city[1],0,100); else S.rightHealth=clamp(S.rightHealth+eff.city[1],0,100); }
  if(eff.city2) { if(eff.city2[0]==='left') S.leftHealth=clamp(S.leftHealth+eff.city2[1],0,100); else S.rightHealth=clamp(S.rightHealth+eff.city2[1],0,100); }
  if(eff.flag) S.flags[eff.flag]=true;
  if(eff.memory) S.memories.add(eff.memory);
}

/* ── Scene Engine ─────────────────────────────────────────── */
async function playScene(sceneId) {
  const scene = SCENES[sceneId];
  if(!scene) { console.error('Scene not found:', sceneId); return; }

  // Background
  if(scene.bg) setBg(scene.bg, scene.bgLabel||'');
  if(scene.city) setCity(scene.city);

  // Chapter title
  if(scene.chapter && scene.chapter.zh) {
    $('#hud-chapter').textContent = scene.chapter.zh;
    $('#hud-chapter').classList.add('show');
    await showChapterTitle(scene.chapter.zh, scene.chapter.en);
  } else if(scene.chapter && !scene.chapter.zh) {
    $('#hud-chapter').classList.remove('show');
  }

  // Apply scene-level effects
  applyEffects(scene.effect);

  // Play dialogue
  S.sceneQueue = scene.dialogue;
  S.sceneIndex = 0;
  await advanceDialogue();
}

function advanceDialogue() {
  return new Promise(resolve => {
    if(S.sceneIndex >= S.sceneQueue.length) { resolve(); return; }
    const item = S.sceneQueue[S.sceneIndex];
    S.sceneIndex++;

    // Character show
    if(item.charShow) { showCharacter(item.charShow, item.charColor, item.charNameColor); advanceDialogue().then(resolve); return; }
    if(item.charHide) { hideCharacter(item.charHide); advanceDialogue().then(resolve); return; }

    // Achievement
    if(item.achievement) {
      showAchievement(item.achievement.id, item.achievement.name, item.achievement.desc);
      advanceDialogue().then(resolve); return;
    }

    // Auto next scene
    if(item.autoNext) {
      playScene(item.autoNext).then(resolve); return;
    }

    // Choice
    if(item.choice) {
      const ch = item.choice;
      S.choiceCallback = (type) => {
        const sel = type==='truth'?ch.truth: type==='lie'?ch.lie:ch.silent;
        if(sel && sel.text) {
          // Show chosen text briefly
          showDialogue('', sel.text);
          setTimeout(() => playScene(sel.next).then(resolve), 2200);
        } else if(sel && sel.next) {
          playScene(sel.next).then(resolve);
        }
      };
      const hasSilent = !!ch.silent;
      const truthText = ch.truth ? ((ch.truth.label||'真话') + (ch.truth.text ? '\n'+ch.truth.text : '')) : '真话';
      const lieText = ch.lie ? ((ch.lie.label||'假话') + (ch.lie.text ? '\n'+ch.lie.text : '')) : '假话';
      showWheel(ch.context, truthText, lieText, hasSilent);
      return;
    }

    // Dialogue
    const text = typeof item.text === 'function' ? item.text() : item.text;
    showDialogue(item.speaker || '', text);

    // Wait for click
    const handler = () => {
      if(S.typing) {
        // Skip typing
        clearInterval(S.typeTimer); S.typeTimer=null; S.typing=false;
        const dt = $('#dialogue-text');
        const typed = dt.querySelector('#typed-text');
        if(typed) typed.textContent = text;
        return;
      }
      $('#dialogue-text').removeEventListener('click', handler);
      advanceDialogue().then(resolve);
    };
    $('#dialogue-text').addEventListener('click', handler);
  });
}

/* ── Game Flow ────────────────────────────────────────────── */
function startGame() {
  $('#main-menu').classList.add('hidden');
  // Reset state
  S.truthScore=0; S.lieScore=0; S.silentCount=0;
  S.relationships = {baisui:30,xiaoxue:30,shiyan:20,yan:30,li:30,yunshang:30,miyu:30,huayan:20,ming:30,yao:30,ying:50};
  S.flags={}; S.memories=new Set(); S.achievements=new Set();
  S.leftHealth=100; S.rightHealth=100;
  updateHUD();
  playScene('prologue');
}

function togglePause() {
  S.paused = !S.paused;
  if(S.paused) $('#pause-overlay').classList.add('show');
  else $('#pause-overlay').classList.remove('show');
}

function returnToMenu() {
  S.paused = false;
  $('#pause-overlay').classList.remove('show');
  hideDialogue();
  hideWheel();
  $('#character-layer').innerHTML = '';
  $('#particles').innerHTML = '';
  $('#hud-chapter').classList.remove('show');
  $('#hud-alignment').classList.remove('show');
  $('#main-menu').classList.remove('show');
  $('#main-menu').classList.remove('hidden');
}

function showAbout() {
  alert('《镜中城》City of Mirrors\n\n一座城市被镜墙劈成两半。\n左城只能说真话，右城只能说假话。\n你是唯一能说两种话的人。\n\n真话不等于善良，善良不必是真话。\n真正的智慧在于何时选择诚实，何时选择温柔。\n\nRen\'Py 原版开发中 | Web 演示版 v0.1');
}

/* ── Keyboard ─────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if(e.key==='Escape') { if($('#wheel-overlay').classList.contains('show')) return; togglePause(); }
  if(e.key==='1' && $('#wheel-overlay').classList.contains('show')) choose('truth');
  if(e.key==='2' && $('#wheel-overlay').classList.contains('show')) choose('lie');
  if((e.key==='s'||e.key==='S') && $('#wheel-overlay').classList.contains('show')) choose('silent');
  if(e.key===' ' || e.key==='Enter') {
    if(S.paused || $('#main-menu').classList.contains('show')==='') return;
    if($('#wheel-overlay').classList.contains('show')) return;
    $('#dialogue-text').click();
  }
});

/* ── Init ─────────────────────────────────────────────────── */
$('#dialogue-text').addEventListener('click', () => {
  if(S.typing) {
    clearInterval(S.typeTimer); S.typeTimer=null; S.typing=false;
    const dt = $('#dialogue-text');
    const typed = dt.querySelector('#typed-text');
    const curr = S.sceneQueue[S.sceneIndex-1];
    if(typed && curr && curr.text) {
      const t = typeof curr.text==='function'? curr.text():curr.text;
      typed.textContent = t;
    }
  }
});

</script>
